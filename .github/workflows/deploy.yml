name: Production Deployment

# This tells GitHub WHEN to run this script
on:
  push:
    branches:
      - main  # 👈 This ensures it ONLY runs when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Webhook
        # This sends the "ping" to Vercel using the secret you saved in Step 1
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"